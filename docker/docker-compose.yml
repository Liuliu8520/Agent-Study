services:
  mysql:
    image: mysql:8.0
    container_name: agent-study-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: agentstudy
      MYSQL_DATABASE: agent_study
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - agent-study-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pagentstudy"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: agent-study-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - agent-study-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  agent-study-mysql-data:
  agent-study-redis-data:
