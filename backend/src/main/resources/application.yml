server:
  port: 8080

spring:
  application:
    name: agent-study-backend

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

agent-study:
  admin:
    username: ${AGENT_STUDY_ADMIN_USERNAME:admin}
    password: ${AGENT_STUDY_ADMIN_PASSWORD:agentstudy}
    jwt-secret: ${AGENT_STUDY_ADMIN_JWT_SECRET:agent-study-local-development-secret-change-me}
    token-ttl-minutes: ${AGENT_STUDY_ADMIN_TOKEN_TTL_MINUTES:120}
  llm:
    provider: ${AGENT_STUDY_LLM_PROVIDER:mock}
    base-url: ${AGENT_STUDY_LLM_BASE_URL:}
    api-key: ${AGENT_STUDY_LLM_API_KEY:}
    model: ${AGENT_STUDY_LLM_MODEL:glm-4-flash}
    temperature: ${AGENT_STUDY_LLM_TEMPERATURE:0.2}
    max-tokens: ${AGENT_STUDY_LLM_MAX_TOKENS:1024}
    timeout-seconds: ${AGENT_STUDY_LLM_TIMEOUT_SECONDS:30}
    fallback-to-mock: ${AGENT_STUDY_LLM_FALLBACK_TO_MOCK:true}
